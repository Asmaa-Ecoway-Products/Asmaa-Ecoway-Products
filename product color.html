<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#2d5a27',
                            light: '#e8f3e8',
                            gold: '#d4af37',
                            accent: '#4c8c4a'
                        }
                    },
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fbfbfb;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #2d5a27; border-radius: 10px; }
        
        .img-placeholder {
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(145deg, #f0f0f0, #fafafa);
            color: #2d5a27; font-weight: 600;
            border-radius: 1rem;
            text-align: center;
            overflow: hidden;
        }

        .img-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .img-placeholder img:hover {
            transform: scale(1.05);
        }

        /* أنيميشن دوران للون المختار */
        .color-option {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .color-option:hover {
            transform: scale(1.2);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }
        .color-option.selected {
            transform: scale(1.1);
            box-shadow: 0 0 0 3px #2d5a27, 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }
        .color-option.selected::after {
            content: "✓";
            position: absolute;
            top: -5px;
            right: -5px;
            background: #2d5a27;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid white;
        }

        /* حاوية الصور المصغرة */
        .thumbnail-container {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 0.75rem;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            background: #f9f9f9;
            overflow: hidden;
        }
        .thumbnail:hover {
            border-color: #4c8c4a;
            transform: scale(1.05);
        }
        .thumbnail.active {
            border-color: #2d5a27;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* زر الكمية */
        .quantity-btn {
            transition: all 0.2s ease;
        }
        .quantity-btn:active {
            transform: scale(0.95);
        }

        /* Cart Drawer Styles */
        #cart-drawer { transition: transform 0.3s ease; }
        .cart-item { transition: all 0.2s ease; }
        .cart-item:hover { background-color: #f8faf8; }

        /* أزرار التنقل بين الصور */
        .image-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.9);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            color: #2d5a27;
            font-size: 1.3rem;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .image-nav-btn:hover {
            background-color: white;
            width: 48px;
            height: 48px;
        }
        .image-nav-btn.next { right: 15px; }
        .image-nav-btn.prev { left: 15px; }

        /* فيديو */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <!-- الهيدر -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-brand-dark flex items-center gap-2">

            <nav class="hidden md:flex items-center gap-6 font-semibold text-gray-600">

                <a href="index.html#categories" class="hover:text-brand-dark">الأقسام</a>

            <div class="flex items-center gap-4">
                <button onclick="openLoginModal()" class="text-gray-600 hover:text-brand-dark transition-colors flex items-center gap-1">

    </header>

    <!-- موبايل ناف -->
    <div id="mobile-nav-overlay" class="fixed inset-0 bg-black/50 z-50 hidden opacity-0 transition-opacity duration-300"></div>
    <aside id="mobile-nav-drawer" class="fixed top-0 right-0 w-64 h-full bg-white z-50 transform translate-x-full transition-transform duration-300 ease shadow-2xl">
        <div class="p-4 border-b border-gray-100 flex justify-between bg-brand-light">
            <h2 class="text-xl font-bold text-brand-dark flex items-center gap-2"><i class="ph-fill ph-leaf"></i> القائمة</h2>
            <button id="close-mobile-nav" class="text-gray-500 hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
        </div>
        <nav class="p-4 flex flex-col gap-4 font-semibold">
            <a href="index.html" class="p-2 hover:bg-gray-50 rounded">الرئيسية</a>
            <a href="more.html" class="p-2 hover:bg-gray-50 rounded">منتجاتنا</a>
            <a href="#" class="p-2 hover:bg-gray-50 rounded">انضمي لفريقنا</a>
        </nav>
    </aside>

    <!-- سلة المشتريات -->
    <div id="cart-drawer" class="fixed inset-y-0 left-0 w-full sm:w-96 bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 ease z-50 flex flex-col">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-brand-light">
            <h2 class="text-xl font-bold text-brand-dark flex items-center gap-2"><i class="ph ph-shopping-cart"></i> سلة المشتريات</h2>
            <button onclick="toggleCart()" class="text-gray-500 hover:text-red-500 bg-white rounded-full p-1 shadow-sm"><i class="ph ph-x text-xl"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-3" id="cart-items"></div>
        <div class="p-4 border-t border-gray-100 bg-white">
            <div class="flex justify-between items-center mb-4 text-lg font-bold">
                <span>الإجمالي:</span>
                <span id="cart-total" class="text-brand-dark">0 جنيه</span>
            </div>
            <button onclick="checkout()" class="block text-center w-full bg-brand-dark text-white py-3 rounded-xl font-bold hover:bg-brand-accent transition-all duration-300 shadow-md">
                إتمام الطلب
            </button>
        </div>
    </div>
    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity duration-300 opacity-0"></div>

    <!-- ========== محتوى صفحة المنتج بالألوان ========== -->
    <main class="container mx-auto px-4 py-6 md:py-10">
        <div id="product-details-container" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-4 md:p-6">
            <!-- محتوى المنتج هيتحط هنا عن طريق JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gradient-to-b from-white to-gray-50 border-t border-gray-200 pt-12 pb-4 relative overflow-hidden mt-12">
        <div class="absolute inset-0 opacity-5 pointer-events-none">
            <i class="ph-fill ph-leaf absolute top-10 right-10 text-7xl text-brand-dark rotate-12"></i>
            <i class="ph-fill ph-plant absolute bottom-10 left-10 text-8xl text-brand-accent -rotate-12"></i>
        </div>
        <div class="container mx-auto px-4 relative z-10">
            <div class="border-t border-gray-200 pt-6 mt-4 flex flex-col sm:flex-row justify-between items-center gap-3 text-xs text-gray-500">
                <div>© 2024 متجر Asmaa Ecoway Products. جميع الحقوق محفوظة.</div>
                <div class="flex items-center gap-1 bg-brand-light/50 px-3 py-1.5 rounded-full">
                    <span class="text-gray-600">تم الإنشاء بواسطة</span>
                    <a href="#" class="font-bold text-brand-dark hover:text-brand-accent transition">مينا صموئيل</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // ==================== دوال السلة ====================
        const CART_STORAGE_KEY = 'asmaaEcoCart';
        let cart = [];

        function loadCart() {
            try {
                const savedCart = localStorage.getItem(CART_STORAGE_KEY);
                cart = savedCart ? JSON.parse(savedCart) : [];
            } catch (e) {
                cart = [];
            }
            updateCartUI();
        }
        
        function saveCart() {
            localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cart));
            window.dispatchEvent(new CustomEvent('cartUpdated', { detail: cart }));
            updateCartUI();
        }
        
        function updateCartUI() {
            const countBadge = document.getElementById('cart-count');
            if (countBadge) {
                const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
                countBadge.innerText = totalItems;
            }
            
            const cartItemsContainer = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');
            if (!cartItemsContainer) return;
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<div class="text-center text-gray-400 mt-10 py-8">السلة فارغة حالياً</div>';
                if (cartTotal) cartTotal.innerText = '0 جنيه';
                return;
            }
            
            let itemsHtml = '';
            cart.forEach((item, index) => {
                const colorIndicator = item.selectedColor ? 
                    `<span class="inline-block w-3 h-3 rounded-full mr-1" style="background-color: ${item.selectedColor.code}; border: 1px solid #ddd;"></span>` : '';
                
                itemsHtml += `
                    <div class="cart-item bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div class="flex items-start gap-3">
                            <div class="product-thumb overflow-hidden">
    ${item.image ? `<img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">` : '<i class="ph-fill ph-package"></i>'}
</div>
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold text-gray-800 text-sm mb-1 flex items-center gap-1">
                                    ${item.name}
                                    ${colorIndicator}
                                </h4>
                                <div class="flex items-center justify-between mt-2">
                                    <div class="flex items-center gap-2">
                                        <button onclick="updateQuantity(${index}, -1)" class="w-6 h-6 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-600 hover:border-red-500 hover:text-red-500"><i class="ph ph-minus text-xs"></i></button>
                                        <span class="text-sm font-bold w-5 text-center">${item.quantity || 1}</span>
                                        <button onclick="updateQuantity(${index}, 1)" class="w-6 h-6 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-600 hover:border-green-500 hover:text-green-500"><i class="ph ph-plus text-xs"></i></button>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-brand-dark">${item.price * (item.quantity || 1)} جنيه</span>
                                        <button onclick="removeFromCart(${index})" class="text-gray-400 hover:text-red-500 p-1"><i class="ph ph-trash text-base"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            cartItemsContainer.innerHTML = itemsHtml;
            if (cartTotal) cartTotal.innerText = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0) + ' جنيه';
        }

        function addToCart(product) {
            const existingItemIndex = cart.findIndex(item => 
                item.id === product.id && 
                JSON.stringify(item.selectedColor) === JSON.stringify(product.selectedColor)
            );
            
            if (existingItemIndex !== -1) {
                cart[existingItemIndex].quantity = (cart[existingItemIndex].quantity || 1) + product.quantity;
            } else {
                cart.push(product);
            }
            saveCart();
            openCart();
        }
        
        function removeFromCart(index) { cart.splice(index, 1); saveCart(); }
        function updateQuantity(index, delta) {
            if (index >= 0 && index < cart.length) {
                const item = cart[index];
                const newQuantity = (item.quantity || 1) + delta;
                if (newQuantity <= 0) removeFromCart(index);
                else { item.quantity = newQuantity; saveCart(); }
            }
        }

        function openCart() {
            const drawer = document.getElementById('cart-drawer');
            const overlay = document.getElementById('cart-overlay');
            if (drawer && overlay) {
                drawer.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                document.body.style.overflow = 'hidden';
            }
        }
        
        function closeCart() {
            const drawer = document.getElementById('cart-drawer');
            const overlay = document.getElementById('cart-overlay');
            if (drawer && overlay) {
                drawer.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
                document.body.style.overflow = '';
            }
        }
        
        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            const isOpen = drawer && !drawer.classList.contains('-translate-x-full');
            if (isOpen) closeCart(); else openCart();
        }

        function checkout() {
            if (!selectedColor) {
                alert('الرجاء اختيار لون أولاً');
                return;
            }
            window.location.href = `checkout.html?buyNowId=${currentProduct.id}&buyNowQty=${currentQuantity}&color=${encodeURIComponent(selectedColor.name)}`;
        }

        // ==================== بيانات الألوان والمنتج ====================
        const colorOptions = [
            { name: 'أحمر كلاسيك', code: '#ef4444', textColor: 'أحمر' },
            { name: 'أزرق سماوي', code: '#3b82f6', textColor: 'أزرق' },
            { name: 'أخضر زيتي', code: '#84cc16', textColor: 'أخضر' },
            { name: 'بنفسجي غامق', code: '#8b5cf6', textColor: 'بنفسجي' }
        ];

        // منتج متعدد الألوان مع روابط صور حقيقية
        const multiColorProduct = {
            id: 9,
            name: 'طقم عباءات مخملية فاخرة',
            basePrice: 450,
            category: 'fashion',
            images: {
                'أحمر كلاسيك': [
                    'https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=400',
                    'https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03?w=400',
                    'https://images.unsplash.com/photo-1603400521630-9f2de124b33b?w=400'
                ],
                'أزرق سماوي': [
                    'https://images.unsplash.com/photo-1624206112918-f140f087f9b5?w=400',
                    'https://images.unsplash.com/photo-1624206112918-f140f087f9b5?w=400',
                    'https://images.unsplash.com/photo-1624206112918-f140f087f9b5?w=400'
                ],
                'أخضر زيتي': [
                    'https://images.unsplash.com/photo-1624206112918-f140f087f9b5?w=400',
                    'https://images.unsplash.com/photo-1624206112918-f140f087f9b5?w=400',
                    'https://images.unsplash.com/photo-1624206112918-f140f087f9b5?w=400'
                ],
                'بنفسجي غامق': [
                    'https://images.unsplash.com/photo-1624206112918-f140f087f9b5?w=400',
                    'https://images.unsplash.com/photo-1624206112918-f140f087f9b5?w=400',
                    'https://images.unsplash.com/photo-1624206112918-f140f087f9b5?w=400'
                ]
            },
            description: 'طقم عباءات فاخرة من المخمل الناعم، مناسب للسهرات والمناسبات الخاصة. تصميم أنيق ومريح مع تطريز يدوي.',
            rating: 4.9,
            reviews: 87,
            priceByColor: {
                'أحمر كلاسيك': 450,
                'أزرق سماوي': 475,
                'أخضر زيتي': 450,
                'بنفسجي غامق': 500
            },
            videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ' // مثال فيديو يوتيوب
        };

        // متغيرات الحالة
        let currentImageIndex = 0;
        let productImages = [];
        let currentProduct = multiColorProduct;
        let selectedColor = colorOptions[0];
        let currentQuantity = 1;
        let slideshowInterval;
        let isUserInteracting = false;
        let isVideoPlaying = false;

        // ==================== عرض تفاصيل المنتج ====================
        function displayProductDetails() {
            const container = document.getElementById('product-details-container');
            
            currentProduct = multiColorProduct;
            productImages = currentProduct.images[selectedColor.name];
            currentImageIndex = 0;
            isVideoPlaying = false;

            // بناء HTML الصور المصغرة
            let thumbnailsHtml = '';
            productImages.forEach((img, index) => {
                thumbnailsHtml += `<div class="thumbnail ${index === 0 ? 'active' : ''}" onclick="changeMainImage(${index})"><img src="${img}" alt="صورة المنتج"></div>`;
            });
            // إضافة أيقونة الفيديو
            thumbnailsHtml += `<div class="thumbnail bg-gray-200 img-placeholder text-brand-dark" onclick="playVideo()"><i class="ph-fill ph-video text-2xl"></i></div>`;

            // بناء HTML اختيارات الألوان
            let colorSelectorHtml = `
                <div class="mb-6">
                    <h3 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
                        <i class="ph-fill ph-palette text-brand-dark text-xl"></i>
                        اختر اللون المناسب:
                    </h3>
                    <div class="flex gap-4 flex-wrap items-center">
                        ${colorOptions.map(color => `
                            <button onclick="selectColor('${color.name}', '${color.code}')" 
                                    class="color-option ${selectedColor.name === color.name ? 'selected' : ''}"
                                    style="background-color: ${color.code};"
                                    title="${color.name}">
                            </button>
                        `).join('')}
                    </div>
                    <p class="text-sm text-gray-500 mt-3">
                        <span class="font-bold text-brand-dark">اللون المختار:</span> 
                        <span id="selected-color-name" class="mr-1">${selectedColor.name}</span>
                    </p>
                </div>
            `;

            let currentPrice = currentProduct.priceByColor[selectedColor.name];

            const productHtml = `
                <div class="flex flex-col lg:flex-row gap-6 lg:gap-10">
                    <!-- الجزء الأيمن: معرض الصور -->
                    <div class="lg:w-1/2">
                        <div class="relative group" id="image-gallery-container">
                            <div id="main-image" class="w-full aspect-square bg-gray-100 rounded-2xl img-placeholder text-lg border border-gray-200 shadow-inner">
                                <img src="${productImages[0]}" alt="صورة المنتج" class="w-full h-full object-cover">
                            </div>
                            
                            <!-- أزرار التنقل (تظهر فقط إذا لم يكن فيديو) -->
                            <button onclick="prevImage(event)" class="image-nav-btn prev opacity-0 group-hover:opacity-100 transition-opacity duration-300 ${isVideoPlaying ? 'hidden' : ''}" aria-label="الصورة السابقة">
                                <i class="ph-bold ph-caret-right"></i>
                            </button>
                            <button onclick="nextImage(event)" class="image-nav-btn next opacity-0 group-hover:opacity-100 transition-opacity duration-300 ${isVideoPlaying ? 'hidden' : ''}" aria-label="الصورة التالية">
                                <i class="ph-bold ph-caret-left"></i>
                            </button>
                        </div>
                        
                        <!-- الصور المصغرة -->
                        <div class="thumbnail-container">
                            ${thumbnailsHtml}
                        </div>
                    </div>

                    <!-- الجزء الأيسر: التفاصيل -->
                    <div class="lg:w-1/2 flex flex-col">
                        <nav class="text-sm text-gray-500 mb-3 flex gap-1">
                            <a href="more.html" class="hover:text-brand-dark transition">منتجاتنا</a>
                            <span>/</span>
                            <span class="text-brand-dark font-semibold">${currentProduct.name}</span>
                        </nav>

                        <h1 class="text-3xl md:text-4xl font-black text-brand-dark mb-3">${currentProduct.name}</h1>
                        
                        <!-- التقييم -->
                        <div class="flex items-center gap-2 mb-4">
                            <div class="text-amber-400 text-lg">${'★'.repeat(Math.floor(currentProduct.rating))}${currentProduct.rating % 1 !== 0 ? '½' : ''}</div>
                            <span class="text-gray-500 text-sm">(${currentProduct.reviews} تقييم)</span>
                        </div>

                        <!-- السعر -->
                        <div class="text-3xl font-bold text-brand-accent mb-4" id="product-price">${currentPrice} جنيه</div>

                        <!-- وصف المنتج -->
                        <div class="bg-brand-light/30 p-5 rounded-xl border-r-4 border-brand-dark mb-6">
                            <h2 class="text-sm font-bold text-gray-500 mb-2 flex items-center gap-1">
                                <i class="ph-fill ph-quotes text-brand-dark"></i> عن هذا المنتج
                            </h2>
                            <p class="text-gray-700 leading-relaxed text-base md:text-lg">${currentProduct.description}</p>
                        </div>

                        <!-- اختيار الألوان -->
                        ${colorSelectorHtml}

                        <!-- التحكم في الكمية -->
                        <div class="flex items-center gap-4 mb-6">
                            <span class="font-semibold text-gray-700">الكمية:</span>
                            <div class="flex items-center border border-gray-300 rounded-full overflow-hidden bg-white shadow-sm">
                                <button onclick="changeQuantity(-1)" class="quantity-btn w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-gray-100 transition text-xl">−</button>
                                <span id="product-quantity" class="w-12 text-center font-bold text-brand-dark">1</span>
                                <button onclick="changeQuantity(1)" class="quantity-btn w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-gray-100 transition text-xl">+</button>
                            </div>
                        </div>

                        <!-- أزرار الإجراء -->
                        <div class="flex flex-col sm:flex-row gap-3 mt-auto">
                            <button onclick="addCurrentToCart()" class="flex-1 bg-brand-dark text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-brand-accent transition-all duration-300 hover:-translate-y-1 shadow-md text-lg">
                                <i class="ph-bold ph-shopping-cart"></i> أضف للسلة
                            </button>
                            <button onclick="checkout()" class="flex-1 border-2 border-brand-dark text-brand-dark py-3 rounded-xl font-bold hover:bg-brand-dark hover:text-white transition-all duration-300 hover:-translate-y-1 shadow-md text-lg">
                                شراء الآن
                            </button>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = productHtml;

            startSlideshow();
        }

        // ==================== دوال اختيار الألوان ====================
        function selectColor(colorName, colorCode) {
            selectedColor = { name: colorName, code: colorCode };
            
            document.querySelectorAll('.color-option').forEach(btn => {
                if (btn.style.backgroundColor === colorCode) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
            
            document.getElementById('selected-color-name').textContent = colorName;
            
            productImages = currentProduct.images[colorName];
            currentImageIndex = 0;
            isVideoPlaying = false;
            changeMainImage(0);
            
            const thumbnailContainer = document.querySelector('.thumbnail-container');
            if (thumbnailContainer) {
                let thumbnailsHtml = '';
                productImages.forEach((img, index) => {
                    thumbnailsHtml += `<div class="thumbnail ${index === 0 ? 'active' : ''}" onclick="changeMainImage(${index})"><img src="${img}" alt="صورة المنتج"></div>`;
                });
                thumbnailsHtml += `<div class="thumbnail bg-gray-200 img-placeholder text-brand-dark" onclick="playVideo()"><i class="ph-fill ph-video text-2xl"></i></div>`;
                thumbnailContainer.innerHTML = thumbnailsHtml;
            }
            
            const newPrice = currentProduct.priceByColor[colorName];
            document.getElementById('product-price').textContent = newPrice + ' جنيه';
            
            // إظهار أزرار التنقل
            document.querySelectorAll('.image-nav-btn').forEach(btn => btn.classList.remove('hidden'));
            
            isUserInteracting = true;
            resetSlideshow();
        }

        // ==================== دوال المعرض ====================
        function changeMainImage(index) {
            if (index < 0) index = productImages.length - 1;
            if (index >= productImages.length) index = 0;
            
            currentImageIndex = index;
            isVideoPlaying = false;
            
            const mainImageDiv = document.getElementById('main-image');
            if (mainImageDiv) {
                mainImageDiv.innerHTML = `<img src="${productImages[currentImageIndex]}" alt="صورة المنتج" class="w-full h-full object-cover">`;
            }
            
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                if (i === currentImageIndex) thumb.classList.add('active');
                else thumb.classList.remove('active');
            });

            // إظهار أزرار التنقل
            document.querySelectorAll('.image-nav-btn').forEach(btn => btn.classList.remove('hidden'));

            isUserInteracting = true;
            resetSlideshow();
        }

        function nextImage(event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (!isVideoPlaying) {
                changeMainImage(currentImageIndex + 1);
            }
        }

        function prevImage(event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (!isVideoPlaying) {
                changeMainImage(currentImageIndex - 1);
            }
        }

        function startSlideshow() {
            if (slideshowInterval) clearInterval(slideshowInterval);
            slideshowInterval = setInterval(() => {
                if (!isUserInteracting && !isVideoPlaying) {
                    nextImage();
                }
            }, 3000);
        }

        function resetSlideshow() {
            if (slideshowInterval) clearInterval(slideshowInterval);
            setTimeout(() => {
                isUserInteracting = false;
            }, 5000);
            startSlideshow();
        }

        function playVideo() {
            const mainImageDiv = document.getElementById('main-image');
            if (!mainImageDiv) return;
            
            isVideoPlaying = true;
            
            // إخفاء أزرار التنقل
            document.querySelectorAll('.image-nav-btn').forEach(btn => btn.classList.add('hidden'));
            
            // تشغيل الفيديو (يوتيوب)
            mainImageDiv.innerHTML = `
                <div class="video-container">
                    <iframe src="${currentProduct.videoUrl}" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                    </iframe>
                </div>
            `;
            
            // إلغاء تحديد الصور المصغرة
            document.querySelectorAll('.thumbnail').forEach(thumb => thumb.classList.remove('active'));
            
            isUserInteracting = true;
            resetSlideshow();
        }

        // ==================== دوال مساعدة ====================
        function changeQuantity(delta) {
            const qtySpan = document.getElementById('product-quantity');
            if (qtySpan) {
                let newQty = currentQuantity + delta;
                if (newQty >= 1 && newQty <= 99) {
                    currentQuantity = newQty;
                    qtySpan.innerText = currentQuantity;
                }
            }
            isUserInteracting = true;
            resetSlideshow();
        }

function addCurrentToCart(productId) {
    const product = allProducts.find(p => p.id === productId);
    if (product) {
        addToCart({
            id: product.id,
            name: product.name,
            price: product.price,
            quantity: currentQuantity,
            category: product.category,
            image: product.images[0] // إضافة الصورة الأولى
        });
        currentQuantity = 1;
        document.getElementById('product-quantity').innerText = '1';
    }
    isUserInteracting = true;
    resetSlideshow();
}

        // ==================== تهيئة الموبايل ناف ====================
        function initMobileNav() {
            const menuBtn = document.getElementById('mobile-menu-btn');
            const closeBtn = document.getElementById('close-mobile-nav');
            const overlay = document.getElementById('mobile-nav-overlay');
            const drawer = document.getElementById('mobile-nav-drawer');

            if (menuBtn) {
                menuBtn.addEventListener('click', () => {
                    drawer.classList.remove('translate-x-full');
                    overlay.classList.remove('hidden');
                    setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                    document.body.style.overflow = 'hidden';
                });
            }
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    drawer.classList.add('translate-x-full');
                    overlay.classList.add('opacity-0');
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                    document.body.style.overflow = '';
                });
            }
            if (overlay) {
                overlay.addEventListener('click', () => {
                    drawer.classList.add('translate-x-full');
                    overlay.classList.add('opacity-0');
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                    document.body.style.overflow = '';
                });
            }
        }

        // ==================== بدء التشغيل ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
            displayProductDetails();
            initMobileNav();
        });

        window.addEventListener('storage', (e) => { if (e.key === CART_STORAGE_KEY) loadCart(); });
        window.addEventListener('cartUpdated', (e) => { cart = e.detail; updateCartUI(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCart(); });
    </script>
</body>
</html>
